# livekit.yaml — LiveKit server configuration for zpulse
# API keys are set via the LIVEKIT_KEYS environment variable in docker-compose.yml.
# Change LIVEKIT_API_KEY and LIVEKIT_API_SECRET in your .env file.

port: 7880
rtc:
  tcp_port: 7881
  udp_port: 7882
  port_range_start: 50100
  port_range_end: 50120
  use_external_ip: true

turn:
  enabled: false

logging:
  level: info
  pion_level: error
